<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="hexagonWrap">
        <div id="hexagon"></div>
    </div>
    <div id="test"></div>
</body>
</html>
<style>

body {
    margin:10% auto;
}

#hexagonWrap {
    display: flex;
    justify-content: center;
    align-items: center;
}
#hexagon {
    width: 100px;
    height: 55px;
    background: orange;
    position: relative;
    transform: rotateZ(269deg);
}

#hexagon:before {
    content: "";
    position: absolute;
    top: -25px;
    left: 0;
    width: 0;
    height: 0;
    border-left: 50px solid transparent;
    border-right: 50px solid transparent;
    border-bottom: 25px solid orange;
}

#hexagon:after {
    content: "";
    position: absolute;
    bottom: -25px;
    left: 0;
    width: 0;
    height: 0;
    border-left: 50px solid transparent;
    border-right: 50px solid transparent;
    border-top: 25px solid orange;
}

#test {
    width: 100px;
    height: 100px;
    background: pink;
    position: relative;
}
#test:before {
    content: "";
    width: 100px;
    height: 0;
    position: absolute;
    top: 0;
    left: 0;
    border-bottom: 29px solid pink;
    border-left: 29px solid #eee;
    border-right: 29px solid #eee;
}
#test:after {
    content: "";
    width: 100px;
    height: 0;
    position: absolute;
    bottom: 0;
    left: 0;
    border-top: 29px solid pink;
    border-left: 29px solid #eee;
    border-right: 29px solid #eee;
}  
</style>
